name: MellorityFlowPOC
options:
  bundleIdPrefix: com.melloria
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    PRODUCT_BUNDLE_IDENTIFIER: com.melloria.flowpoc
    INFOPLIST_FILE: App/Info.plist
targets:
  MellorityFlowPOC:
    type: application
    platform: iOS
    sources:
      - App
      - Core
      - Flow
      - Screens
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Mellority Flow
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: Mellority captures your environment to tailor visuals and sound to the moment.
        NSPhotoLibraryUsageDescription: Choose a photo to analyse colour and mood for your session.
        NSMicrophoneUsageDescription: Spatial audio and session capture may use the microphone in the full product.
        NSHealthShareUsageDescription: Optional heart rate and mindfulness data help adapt your session in the full product.
        NSHealthUpdateUsageDescription: Optional updates for wellness insights in the full product.
    dependencies: []

schemes:
  MellorityFlowPOC:
    build:
      targets:
        MellorityFlowPOC: all
    run:
      config: Debug
